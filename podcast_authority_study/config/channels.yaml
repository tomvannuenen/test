# =============================================================================
# Podcast Authority Study - Channel Corpus Definition
# =============================================================================
# Selection criteria:
#   - Subscriber count / cross-platform prominence
#   - Guest-network centrality (per Lewis 2018 alternative influence network)
#   - Prior literature coverage (Dowling & Miller, Bozzi, Vaarala, Rae)
#   - Typological diversity across host personae
#
# Each channel is tagged with a primary persona type:
#   comedian_generalist    - comedy-adjacent, "just asking questions"
#   political_commentator  - explicitly partisan political commentary
#   manosphere_grievance   - gender politics, masculinity, red-pill adjacent
#   pseudo_journalist      - investigative style, documentary framing
#   libertarian_intellectual - think-tank adjacent, policy-focused
# =============================================================================

